<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#6a00f4,#ff4ecd);
min-height:100vh;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
}

header h1{
font-size:30px;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:#ffd700;
}

/* CARRUSEL */

.carousel{
width:90%;
max-width:1100px;
margin:40px auto;
position:relative;
overflow:hidden;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.slides{
display:flex;
transition:transform .5s ease;
}

.slides img{
width:100%;
height:350px;
object-fit:cover;
}

/* BOTONES */

.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
font-size:25px;
padding:10px 15px;
cursor:pointer;
}

.btn:hover{
background:black;
}

.prev{
left:10px;
}

.next{
right:10px;
}

/* TITULO */

.titulo{
text-align:center;
margin:30px 0;
font-size:35px;
}

/* PRODUCTOS */

.productos{
width:90%;
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding-bottom:60px;
}

.card{
background:rgba(255,255,255,0.15);
border-radius:15px;
overflow:hidden;
backdrop-filter:blur(8px);
transition:.3s;
text-align:center;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:18px;
}

.precio{
padding-bottom:15px;
font-weight:bold;
color:#ffd700;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.25);
}

</style>
</head>

<script>

let index=0
const slides=document.getElementById("slides")
const total=slides.children.length

function showSlide(){
slides.style.transform=`translateX(-${index*100}%)`
}

function nextSlide(){
index=(index+1)%total
showSlide()
}

function prevSlide(){
index=(index-1+total)%total
showSlide()
}

setInterval(nextSlide,5000)

</script>
