<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Muy pronto! Libro a la venta</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #f1c40f;
        }
        img {
            max-width: 100%;
            height: auto;
            border: 5px solid #f1c40f;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .cta-section {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
        }
        input[type="email"] {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background-color: #f1c40f;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Muy pronto! Libro a la venta</h1>
        
        <!-- Aquí iría tu imagen: Portada.jpg -->
        <img src="Portada.jpg" alt="Portada del libro: Una estrella junto a la Luna">
        
        <div class="cta-section">
            <h2>Mantente informado</h2>
            <p>Suscríbete para recibir noticias sobre el lanzamiento.</p>
            <form>
                <input type="email" placeholder="Tu correo electrónico" required>
                <button type="submit">Suscribirme</button>
            </form>
        </div>
    </div>
</body>
</html>
