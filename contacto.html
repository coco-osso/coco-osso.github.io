<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto | Deportes Victoria</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#6a00f4,#ff4ecd);
min-height:100vh;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
}

header h1{
font-size:30px;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:#ffd700;
}

/* SECCION CONTACTO */

.contacto{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
}

.card-contacto{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
max-width:500px;
width:90%;
}

.card-contacto h2{
font-size:35px;
margin-bottom:15px;
}

.card-contacto p{
font-size:20px;
margin-bottom:20px;
}

.whatsapp{
font-size:26px;
font-weight:bold;
color:#00ff88;
}

/* BOTON */

.boton{
display:inline-block;
margin-top:25px;
padding:12px 25px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:.3s;
}

.boton:hover{
background:#1ebc59;
transform:scale(1.05);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.25);
position:absolute;
bottom:0;
width:100%;
}

</style>
</head>

<body>

<header>

<h1>⚽ Deportes Victoria</h1>

<nav>
<a href="index.html">Inicio</a>
<a href="contacto.html">Contacto</a>
</nav>

</header>

<section class="contacto">

<div class="card-contacto">

<h2>Contáctanos</h2>

<p>Para pedidos o información:</p>

<div class="whatsapp">
WhatsApp: 7773440000
</div>

<a class="boton" href="https://wa.me/527773440000" target="_blank">
Enviar mensaje
</a>

</div>

</section>

<footer>
© 2026 Deportes Victoria
</footer>

</body>
</html>
